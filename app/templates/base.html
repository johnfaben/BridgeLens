<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BridgeLens{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #1a1a2e; color: #eee;
               min-height: 100vh; padding: 0; }
        a { color: #5dade2; text-decoration: none; }
        a:hover { text-decoration: underline; }

        .navbar { background: #16213e; padding: 10px 20px; display: flex; justify-content: space-between;
                  align-items: center; border-bottom: 1px solid #222; }
        .navbar .brand { font-size: 18px; font-weight: bold; color: #eee; }
        .navbar .nav-links { display: flex; gap: 16px; font-size: 14px; }

        .content { max-width: 600px; margin: 0 auto; padding: 20px; }

        .flash-messages { max-width: 600px; margin: 10px auto; padding: 0 20px; }
        .flash { background: #16213e; border: 1px solid #333; border-radius: 6px;
                 padding: 10px 14px; margin-bottom: 8px; font-size: 14px; }

        {% block extra_style %}{% endblock %}
    </style>
</head>
<body>
    <nav class="navbar">
        <a class="brand" href="{{ url_for('upload_form') }}">BridgeLens</a>
        <div class="nav-links">
            {% if current_user.is_authenticated %}
                <a href="{{ url_for('history') }}">History</a>
                <a href="{{ url_for('logout') }}">Log out</a>
            {% else %}
                <a href="{{ url_for('login') }}">Log in</a>
            {% endif %}
            <a href="{{ url_for('about') }}">About</a>
            <a href="{{ url_for('privacy') }}">Privacy</a>
        </div>
    </nav>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <div class="flash-messages">
        {% for message in messages %}
        <div class="flash">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <div class="content">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
