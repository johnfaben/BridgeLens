<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bridge Hand Result</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #1a1a2e; color: #eee;
               padding: 16px; max-width: 600px; margin: 0 auto; }
        h1 { font-size: 20px; margin-bottom: 12px; text-align: center; }

        .diagram { display: grid; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: auto auto auto;
                   gap: 4px; margin: 16px 0; text-align: center; }
        .hand { padding: 10px 6px; background: #16213e; border-radius: 8px; font-size: 16px;
                line-height: 1.6; }
        .hand-north { grid-column: 2; grid-row: 1; }
        .hand-west  { grid-column: 1; grid-row: 2; text-align: right; }
        .hand-center { grid-column: 2; grid-row: 2; display: flex; align-items: center;
                       justify-content: center; font-weight: bold; color: #555; font-size: 13px; }
        .hand-east  { grid-column: 3; grid-row: 2; text-align: left; }
        .hand-south { grid-column: 2; grid-row: 3; }
        .hand-label { font-weight: bold; color: #8899aa; font-size: 12px; margin-bottom: 2px; }
        .suit-line { white-space: nowrap; }
        .suit-s, .suit-c { color: #aaccee; }
        .suit-h, .suit-d { color: #e74c3c; }

        .info { text-align: center; color: #8899aa; font-size: 14px; margin: 8px 0; }

        .pbn-box { background: #16213e; padding: 12px; border-radius: 6px; margin: 12px 0;
                   font-family: monospace; font-size: 13px; word-break: break-all;
                   cursor: pointer; position: relative; }
        .pbn-box:hover { background: #1a2744; }
        .copy-hint { position: absolute; right: 8px; top: 8px; color: #555; font-size: 11px; }
        .copied { color: #1b8a2e !important; }

        .bbo-frame { width: 100%; height: 340px; border: none; border-radius: 8px;
                     background: #fff; margin: 12px 0; }

        .bbo-link { display: block; text-align: center; margin: 8px 0; padding: 12px;
                    background: #0f3460; color: #eee; text-decoration: none; border-radius: 8px;
                    font-size: 16px; }
        .bbo-link:hover { background: #1a5276; }

        details { margin: 16px 0; }
        summary { cursor: pointer; color: #8899aa; font-size: 14px; padding: 8px 0; }
        .annotated-image { max-width: 100%; border-radius: 6px; margin-top: 8px; }

        .back-link { display: block; text-align: center; margin: 20px 0; padding: 12px;
                     background: #16213e; color: #5dade2; text-decoration: none; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>Bridge Hand OCR</h1>

    <iframe class="bbo-frame" src="{{ bbo_url }}"></iframe>

    <p class="info">{{ total_cards }} unique cards detected</p>

    <div class="pbn-box" onclick="copyPbn(this)">
        <span class="copy-hint" id="copy-hint">tap to copy</span>
        {{ pbn }}
    </div>

    <a class="bbo-link" href="{{ bbo_url }}" target="_blank">Open in BBO Handviewer</a>

    <h2 style="font-size:16px; margin-top:16px;">Detected Cards</h2>
    <img class="annotated-image" src="{{ url_for('static', filename=image_file) }}" alt="Annotated">

    <a class="back-link" href="{{ url_for('upload_form') }}">Upload another image</a>

<script>
function copyPbn(el) {
    const text = el.textContent.replace('tap to copy', '').trim();
    navigator.clipboard.writeText(text).then(() => {
        const hint = document.getElementById('copy-hint');
        hint.textContent = 'copied!';
        hint.classList.add('copied');
        setTimeout(() => { hint.textContent = 'tap to copy'; hint.classList.remove('copied'); }, 2000);
    });
}
</script>
</body>
</html>
